version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/clients/queries/client.sql"
    schema: "internal/database/migrations"
    gen:
      go:
        package: "clientdb"
        out: "internal/clients/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
          - db_type: "pg_catalog.numeric"
            go_type: "float64"
  - engine: "postgresql"
    queries: "internal/webhooks/queries/webhook_event.sql"
    schema: "internal/database/migrations"
    gen:
      go:
        package: "webhookdb"
        out: "internal/webhooks/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        overrides:
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
